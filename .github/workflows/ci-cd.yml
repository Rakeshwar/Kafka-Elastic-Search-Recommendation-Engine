name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 1 Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2 Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3 Build project
      - name: Build with Maven
        run: mvn clean install

      # 4 Run tests
      - name: Run Tests
        run: mvn test

      # 5 Upload JAR (optional but good)
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

      # 6 ADD HERE (IMPORTANT)
      - name: Build Docker Image
        run: docker build -t product-search-app .